services:
  birak:
    # Image published by the GH Actions "Docker" workflow (Docker Hub).
    # Override/pin via BIRAK_IMAGE in .env (e.g. solkin/birak:1.2.3).
    image: ${BIRAK_IMAGE:-solkin/birak:latest}
    container_name: birak
    restart: unless-stopped

    # The container runs as a non-root user (uid 1000). A bind-mounted host
    # data directory must be owned by this uid:gid (see README).
    user: "1000:1000"

    environment:
      BIRAK_NODE_ID: "${BIRAK_NODE_ID:-node-1}"
      BIRAK_SYNC_DIR: /data/sync
      BIRAK_META_DIR: /data/meta

      # Cap a single upload across all gateways (bytes). 0 = unlimited.
      BIRAK_MAX_UPLOAD_BYTES: "1073741824"

      # --- S3 gateway ---
      BIRAK_S3_ENABLED: "true"
      BIRAK_S3_LISTEN_ADDR: ":9200"
      BIRAK_S3_ACCESS_KEY: "${S3_ACCESS_KEY}"
      BIRAK_S3_SECRET_KEY: "${S3_SECRET_KEY}"

      # --- HTTP UI gateway ---
      BIRAK_HTTP_ENABLED: "true"
      BIRAK_HTTP_LISTEN_ADDR: ":9400"
      BIRAK_HTTP_USERNAME: "${HTTP_USERNAME}"
      BIRAK_HTTP_PASSWORD: "${HTTP_PASSWORD}"

      # --- Unused gateways, kept explicitly off ---
      BIRAK_WEBDAV_ENABLED: "false"
      BIRAK_SFTP_ENABLED: "false"

    volumes:
      # Host files live under /srv/storage/birak; each first-level subdirectory
      # there is an S3 bucket. Must be owned by uid:gid 1000:1000 on the host.
      - /srv/storage/birak:/data/sync
      # Store (SQLite) + SFTP host key — keep on a named volume so they persist.
      - birak-meta:/data/meta

    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9400:9400"
      # Peer-sync HTTP API — publish only when forming a multi-node cluster:
      # - "9100:9100"

volumes:
  birak-meta:
